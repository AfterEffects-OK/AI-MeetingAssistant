<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Minutes Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950">
    <div id="root" class="min-h-screen flex items-center justify-center text-slate-500">
        <div class="text-center">
            <p class="text-xl font-semibold mb-2">Loading...</p>
            <p class="text-sm opacity-75">アプリケーションを起動しています</p>
        </div>
    </div>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('root').innerHTML = '<div class="p-8 text-red-400 bg-slate-900 h-screen"><h1 class="text-2xl font-bold mb-4">エラーが発生しました</h1><pre class="bg-slate-950 p-4 rounded border border-red-900 overflow-auto">'+ message + '\n\n' + source + ':' + lineno + '</pre></div>';
        };
    </script>
    <script type="text/babel" data-type="module">
import React, { useState, useEffect, useRef, useCallback } from 'https://esm.sh/react@18.2.0';
import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
import { createPortal } from 'https://esm.sh/react-dom@18.2.0';
import { 
  Mic, 
  MicOff, 
  Download, 
  Pause,
  Play,
  Clock, 
  AlertCircle,
  Cloud,
  Mic2,
  ChevronDown,
  Loader2,
  ExternalLink,
  Maximize2,
  Minimize2
} from 'https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0';

const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzD_00xQa7yhByjXE6JkDkJbm4yumpl0KP1W5dKwKSvUHolvCR1Y2CNyKc5Kbx20eB6/exec";

// --- Components for Mini Window ---

const MiniWindow = ({ children, onClose }) => {
  const [container, setContainer] = useState(null);
  const windowRef = useRef(null);

  useEffect(() => {
    // Open a new popup window
    const newWindow = window.open('', 'MiniMode', 'width=400,height=300,left=200,top=200');
    if (!newWindow) {
      alert('ポップアップがブロックされました。ブラウザの設定で許可してください。');
      onClose();
      return;
    }
    windowRef.current = newWindow;

    // Setup document in new window
    newWindow.document.title = "Mini Mode - AI Minutes";
    
    // Inject Tailwind CSS
    const script = newWindow.document.createElement('script');
    script.src = "https://cdn.tailwindcss.com";
    newWindow.document.head.appendChild(script);
    
    newWindow.document.body.className = "bg-slate-950 text-slate-200 overflow-hidden";
    
    const div = newWindow.document.createElement('div');
    div.className = "h-full";
    newWindow.document.body.appendChild(div);
    setContainer(div);

    const handleUnload = () => {
      onClose();
    };
    newWindow.addEventListener('beforeunload', handleUnload);

    return () => {
      newWindow.removeEventListener('beforeunload', handleUnload);
      if (windowRef.current && !windowRef.current.closed) {
        windowRef.current.close();
      }
    };
  }, []);

  return container ? createPortal(children, container) : null;
};

const MiniModeContent = ({ transcriptions, currentTranscript, isRecording, toggleRecording, onClose }) => {
  const bottomRef = useRef(null);
  
  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [transcriptions, currentTranscript]);

  return (
    <div className="h-full flex flex-col relative bg-slate-950 p-4">
      <div className="absolute top-2 right-2 z-50 flex gap-2 opacity-50 hover:opacity-100 transition-opacity">
        <button
          onClick={toggleRecording}
          className={`p-2 rounded-full shadow-lg ${isRecording ? 'bg-red-500 text-white' : 'bg-indigo-600 text-white'}`}
          title={isRecording ? "録音停止" : "録音開始"}
        >
          {isRecording ? <MicOff size={16} /> : <Mic size={16} />}
        </button>
        <button
          onClick={onClose}
          className="p-2 rounded-full bg-slate-800 text-slate-400 hover:text-slate-200 hover:bg-slate-700 shadow-lg transition-colors"
          title="閉じる"
        >
          <Maximize2 size={16} />
        </button>
      </div>

      <div className="flex-1 overflow-y-auto flex flex-col justify-end space-y-4">
        {transcriptions.slice(-3).map((t, index, arr) => (
          <div key={t.id} className="flex gap-3 animate-in fade-in slide-in-from-bottom-2 duration-500">
             <div className="flex flex-col items-center gap-1 pt-1">
               <div className="w-1.5 h-1.5 rounded-full bg-slate-700" />
               {index !== arr.length - 1 && <div className="w-px h-full bg-slate-800/50" />}
             </div>
             <div>
               <span className="text-[10px] text-slate-500 font-mono block mb-0.5">{t.time}</span>
               <p className="text-slate-200 text-sm leading-relaxed">{t.text}</p>
             </div>
          </div>
        ))}
        {currentTranscript && (
          <div className="flex gap-3">
             <div className="flex flex-col items-center pt-1">
               <div className="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse" />
             </div>
             <p className="text-indigo-300/90 text-sm leading-relaxed animate-pulse">{currentTranscript}</p>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
    </div>
  );
};

const App = () => {
  // State for recording and transcription
  const [isRecording, setIsRecording] = useState(false);
  const [isPaused, setIsPaused] = useState(false);
  const [isMiniMode, setIsMiniMode] = useState(false);
  const [isMicActive, setIsMicActive] = useState(false); // マイクが物理的にONかどうか
  const [transcriptions, setTranscriptions] = useState([]); // { text, time, id }
  const [currentTranscript, setCurrentTranscript] = useState('');
  const [error, setError] = useState(null);
  
  // Google Drive Settings
  const [isUploading, setIsUploading] = useState(false);
  const [savedUrl, setSavedUrl] = useState(null);

  // Audio Devices
  const [devices, setDevices] = useState([]);
  const [selectedDeviceId, setSelectedDeviceId] = useState('');

  // Refs for Speech Recognition
  const recognitionRef = useRef(null);
  const isRecordingRef = useRef(false); // イベントハンドラ内で最新のstateを参照するため
  const isPausedRef = useRef(false);
  const scrollRef = useRef(null);
  const wakeLockRef = useRef(null);
  const silenceTimerRef = useRef(null);

  // isRecordingの変更をRefに同期
  useEffect(() => {
    isRecordingRef.current = isRecording;
    isPausedRef.current = isPaused;
  }, [isRecording, isPaused]);

  // Load Audio Devices
  useEffect(() => {
    const getDevices = async () => {
      if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
      try {
        // マイクの許可がないとラベルが取得できないため、録音開始後にラベルが更新されるようイベントを監視
        const deviceInfos = await navigator.mediaDevices.enumerateDevices();
        const audioInputs = deviceInfos.filter(d => d.kind === 'audioinput');
        setDevices(audioInputs);
        
        if (audioInputs.length > 0 && !selectedDeviceId) {
          const defaultDevice = audioInputs.find(d => d.deviceId === 'default');
          setSelectedDeviceId(defaultDevice ? defaultDevice.deviceId : audioInputs[0].deviceId);
        }
      } catch (err) {
        console.error("Device enumeration failed", err);
      }
    };

    getDevices();
    navigator.mediaDevices.addEventListener('devicechange', getDevices);
    
    return () => {
      if (navigator.mediaDevices) navigator.mediaDevices.removeEventListener('devicechange', getDevices);
    };
  }, [selectedDeviceId]);

  // Initialize Speech Recognition
  useEffect(() => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setError("お使いのブラウザは音声認識（Web Speech API）をサポートしていません。ChromeまたはEdgeをお試しください。");
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'ja-JP';

    recognition.onstart = () => setIsMicActive(true);
    recognition.onend = () => {
      setIsMicActive(false);
      if (silenceTimerRef.current) clearTimeout(silenceTimerRef.current);
      // 録音中（isRecordingがtrue）なのに終了した場合は、自動的に再開する
      if (isRecordingRef.current) {
        try {
          recognition.start();
        } catch (e) {
          console.error("Failed to restart recognition:", e);
        }
      }
    };

    recognition.onresult = (event) => {
      if (!isRecordingRef.current || isPausedRef.current) return; // 録音停止中または一時停止中は結果を無視する

      // 結果が返ってくるたびに無音タイマーをリセット
      if (silenceTimerRef.current) clearTimeout(silenceTimerRef.current);

      let interim = '';
      let final = '';

      for (let i = event.resultIndex; i < event.results.length; ++i) {
        if (event.results[i].isFinal) {
          final += event.results[i][0].transcript;
        } else {
          interim += event.results[i][0].transcript;
        }
      }

      if (final) {
        // Android Chrome等での重複バグ対策: 空白のみの結果や、直前と完全に一致する結果を除外
        const trimmedFinal = final.trim();
        if (!trimmedFinal) return;

        const timestamp = new Date().toLocaleTimeString();
        setTranscriptions(prev => {
          if (prev.length > 0 && prev[prev.length - 1].text === trimmedFinal) {
            return prev;
          }
          return [...prev, { text: trimmedFinal, time: timestamp, id: Date.now() }];
        });
        setCurrentTranscript('');
      } else {
        setCurrentTranscript(interim);
        
        // 一時的な結果があり、かつ2秒間更新がなければ強制的に確定（再起動）させる
        if (interim.trim().length > 0) {
          silenceTimerRef.current = setTimeout(() => {
            // stop()を呼ぶと、ブラウザは現在の認識結果を確定(final)として送出し、onendへ移行する
            if (isRecordingRef.current && !isPausedRef.current) recognition.stop();
          }, 2000);
        }
      }
    };

    recognition.onerror = (event) => {
      console.error('Speech recognition error', event.error);
      if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
        setError('マイクへのアクセスが拒否されたか、サービスが利用できません。');
        setIsRecording(false); // 再開ループを防ぐために停止
      }
    };

    recognitionRef.current = recognition;
  }, []);

  // Auto-scroll transcription list
  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollIntoView({ behavior: 'smooth' });
    }
  }, [transcriptions, currentTranscript]);

  const handleDeviceChange = async (deviceId) => {
    setSelectedDeviceId(deviceId);
    
    // Web Speech APIは明示的なデバイス指定ができないため、getUserMediaでストリームを取得して
    // ブラウザの入力フォーカスを切り替えるハックを行う
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: deviceId } } });
      stream.getTracks().forEach(t => t.stop()); // ストリームはすぐに解放
      
      // 録音中なら再起動して反映を試みる
      if (isRecording) {
        recognitionRef.current?.stop();
        // onendイベントで自動的に再開される（isRecordingがtrueのため）
        // その際、直前にgetUserMediaで指定したデバイスが使われる可能性が高い
      }
    } catch (e) {
      console.error("Failed to switch device:", e);
    }
  };

  const toggleRecording = async () => {
    if (isRecording) {
      // 録音停止: マイクは切らずに、文字起こしの保存だけ止める
      // recognitionRef.current?.stop(); 
      setIsRecording(false);
      setIsPaused(false);
      if (silenceTimerRef.current) clearTimeout(silenceTimerRef.current);
      
      // Wake Lock 解除（画面スリープ防止を解除）
      if (wakeLockRef.current) {
        await wakeLockRef.current.release().catch(console.error);
        wakeLockRef.current = null;
      }
    } else {
      // 録音開始
      setError(null);
      setTranscriptions([]);
      setIsRecording(true);
      setIsPaused(false);
      
      // 画面のスリープを防ぐ (Wake Lock API)
      if ('wakeLock' in navigator) {
        wakeLockRef.current = await navigator.wakeLock.request('screen').catch(console.error);
      }

      // マイクがまだ起動していない場合のみ起動する
      if (!isMicActive) {
        // 選択されたデバイスがある場合、一度getUserMediaを呼んでアクティブにする
        if (selectedDeviceId) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: selectedDeviceId } } });
            stream.getTracks().forEach(t => t.stop());
          } catch(e) { console.error(e); }
        }
        recognitionRef.current?.start();
      }
    }
  };

  const togglePause = () => {
    setIsPaused(!isPaused);
  };

  const exportDocument = () => {
    const content = `
# 会議文字起こしログ (${new Date().toLocaleDateString()})

## 文字起こし全文
${transcriptions.map(t => `[${t.time}] ${t.text}`).join('\n')}
    `;

    const blob = new Blob([content], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `transcription_${Date.now()}.md`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleGoogleDriveSave = async () => {
    setIsUploading(true);
    setSavedUrl(null);

    try {
      const content = transcriptions.map(t => `[${t.time}] ${t.text}`).join('\n');
      const filename = `会議文字起こし_${new Date().toLocaleString()}`;

      // GASへPOST送信
      // mode: 'cors' で送るが、GAS側からのレスポンスを正しく受け取るために
      // Content-Typeをtext/plainにしてSimple Requestとして送信する
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain', 
        },
        body: JSON.stringify({
          filename: filename,
          content: content
        })
      });

      const result = await response.json();
      
      if (result.status === 'success') {
        setSavedUrl(result.url);
      } else {
        throw new Error(result.message || 'Unknown error');
      }

    } catch (err) {
      console.error(err);
      alert('保存に失敗しました。GASのデプロイ設定（全員がアクセス可能）などを確認してください。');
    } finally {
      setIsUploading(false);
    }
  };

  return (
    <div className="min-h-screen bg-slate-950 text-slate-200 font-sans selection:bg-indigo-500/30">
      {/* Header */}
        <header className="fixed top-0 left-0 right-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-slate-800/60">
          <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
          <h1 className="text-lg font-bold tracking-tight flex items-center gap-2 text-slate-100">
            <div className="p-1.5 bg-indigo-500/10 rounded-lg">
              <Clock size={18} className="text-indigo-400" />
            </div>
            AI Minutes <span className="text-slate-500 font-normal hidden sm:inline">Pro</span>
          </h1>
          
          <div className="flex items-center gap-2">

            {devices.length > 0 && (
              <div className="relative group mr-2 hidden md:block">
                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                  <Mic2 size={14} />
                </div>
                <select 
                  value={selectedDeviceId}
                  onChange={(e) => handleDeviceChange(e.target.value)}
                  className="appearance-none bg-slate-900 border border-slate-800 text-slate-400 text-xs rounded-full pl-9 pr-8 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 hover:bg-slate-800 transition-colors max-w-[160px] truncate cursor-pointer"
                >
                  {devices.map((device, idx) => (
                    <option key={device.deviceId} value={device.deviceId}>
                      {device.label || `マイク ${idx + 1}`}
                    </option>
                  ))}
                </select>
                <ChevronDown size={12} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none" />
              </div>
            )}

            {isRecording ? (
              <>
                <div className="flex items-center gap-2 mr-2 px-3 py-1.5 bg-slate-900 rounded-full border border-slate-800">
                  <span className={`w-2 h-2 rounded-full ${isPaused ? 'bg-yellow-500' : 'bg-red-500 animate-pulse'}`} />
                  <span className="text-xs font-medium text-slate-400 tabular-nums hidden sm:inline">
                    {isPaused ? '一時停止中' : '録音中'}
                  </span>
                </div>
                <button
                  onClick={togglePause}
                  className="p-2 rounded-full hover:bg-slate-800 text-slate-400 hover:text-slate-200 transition-colors"
                  title={isPaused ? '再開' : '一時停止'}
                >
                  {isPaused ? <Play size={20} /> : <Pause size={20} />}
                </button>
                <button
                  onClick={toggleRecording}
                  className="flex items-center gap-2 px-4 py-2 rounded-full bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 transition-all text-sm font-medium"
                >
                  <MicOff size={16} />
                  <span className="hidden sm:inline">終了</span>
                </button>
              </>
            ) : (
              <button
                onClick={toggleRecording}
                className="flex items-center gap-2 px-4 py-2 rounded-full bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-900/20 transition-all text-sm font-medium"
              >
                <Mic size={16} />
                <span className="hidden sm:inline">録音開始</span>
              </button>
            )}
            
            {transcriptions.length > 0 && (
              <>
                <button
                  onClick={handleGoogleDriveSave}
                  disabled={isUploading}
                  className="p-2 rounded-full hover:bg-slate-800 text-slate-400 hover:text-blue-400 transition-colors disabled:opacity-50"
                  title="Google Driveに保存"
                >
                  {isUploading ? <Loader2 size={20} className="animate-spin" /> : <Cloud size={20} />}
                </button>
                <button
                  onClick={exportDocument}
                  className="p-2 rounded-full hover:bg-slate-800 text-slate-400 hover:text-emerald-400 transition-colors"
                  title="ダウンロード"
                >
                  <Download size={20} />
                </button>
                <button
                  onClick={() => setIsMiniMode(!isMiniMode)}
                  className={`hidden md:block p-2 rounded-full hover:bg-slate-800 transition-colors ${isMiniMode ? 'text-indigo-400 bg-indigo-400/10' : 'text-slate-400 hover:text-slate-200'}`}
                  title={isMiniMode ? "ミニモードを閉じる" : "ミニモード（別ウィンドウ）"}
                >
                  <Minimize2 size={20} />
                </button>
              </>
            )}
          </div>
        </div>
      </header>

      {error && (
        <div className="max-w-3xl mx-auto mt-20 mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-lg flex items-center gap-3 text-red-400 text-sm">
          <AlertCircle />
          {error}
        </div>
      )}

      <main className="max-w-3xl mx-auto pt-24 pb-12 px-4">
        
        {savedUrl && (
          <div className="mb-6 p-4 bg-indigo-500/10 border border-indigo-500/20 rounded-lg flex items-center justify-between gap-3 text-indigo-300 text-sm animate-in fade-in slide-in-from-top-2">
            <div className="flex items-center gap-2 overflow-hidden">
              <Cloud size={16} className="shrink-0" />
              <span className="shrink-0">保存しました:</span>
              <a href={savedUrl} target="_blank" rel="noopener noreferrer" className="flex items-center gap-1 underline hover:text-indigo-200 truncate">
                Googleドキュメントを開く <ExternalLink size={12} />
              </a>
            </div>
            <button onClick={() => setSavedUrl(null)} className="p-1 hover:bg-indigo-500/20 rounded shrink-0">
              ✕
            </button>
          </div>
        )}

        {/* Real-time Transcription Panel */}
        <div className="flex flex-col gap-6">
          {transcriptions.length === 0 && !currentTranscript ? (
            <div className="flex flex-col items-center justify-center py-20 text-slate-600">
              <div className="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center mb-4 border border-slate-800">
                <Mic size={24} className="text-slate-500" />
              </div>
              <p className="text-sm font-medium">録音を開始して、会話を記録しましょう</p>
            </div>
          ) : (
            <div className="space-y-6">
              {transcriptions.map((t, index, arr) => (
                <div key={t.id} className="group flex gap-4 animate-in fade-in slide-in-from-bottom-2 duration-500">
                  <div className="flex flex-col items-center gap-2 pt-1">
                    <div className="w-2 h-2 rounded-full bg-slate-800 group-hover:bg-indigo-500/50 transition-colors" />
                    {index !== arr.length - 1 && (
                      <div className="w-px h-full bg-slate-800/50" />
                    )}
                  </div>
                  <div className="flex-1 pb-4">
                    <div className="flex items-baseline gap-3 mb-1">
                      <span className="text-[10px] font-medium text-slate-500 font-mono tracking-wide">
                        {t.time}
                      </span>
                    </div>
                    <p className="text-slate-300 leading-relaxed text-base">
                      {t.text}
                    </p>
                  </div>
                </div>
              ))}
              
              {currentTranscript && (
                <div className="flex gap-4">
                  <div className="flex flex-col items-center pt-1">
                    <div className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse shadow-[0_0_10px_rgba(99,102,241,0.5)]" />
                  </div>
                  <div className="flex-1">
                    <p className="text-indigo-300/90 leading-relaxed text-base animate-pulse">
                      {currentTranscript}
                    </p>
                  </div>
                </div>
              )}
              <div ref={scrollRef} />
            </div>
          )}
        </div>
      </main>

      {/* Mini Window Portal */}
      {isMiniMode && (
        <MiniWindow onClose={() => setIsMiniMode(false)}>
          <MiniModeContent 
            transcriptions={transcriptions}
            currentTranscript={currentTranscript}
            isRecording={isRecording}
            toggleRecording={toggleRecording}
            onClose={() => setIsMiniMode(false)}
          />
        </MiniWindow>
      )}
    </div>
  );
};

const root = createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
