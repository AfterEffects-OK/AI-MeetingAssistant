<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Minutes Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950">
    <div id="root" class="min-h-screen flex items-center justify-center text-slate-500">
        <div class="text-center">
            <p class="text-xl font-semibold mb-2">Loading...</p>
            <p class="text-sm opacity-75">アプリケーションを起動しています</p>
        </div>
    </div>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('root').innerHTML = '<div class="p-8 text-red-400 bg-slate-900 h-screen"><h1 class="text-2xl font-bold mb-4">エラーが発生しました</h1><pre class="bg-slate-950 p-4 rounded border border-red-900 overflow-auto">'+ message + '\n\n' + source + ':' + lineno + '</pre></div>';
        };
    </script>
    <script type="text/babel" data-type="module">
import React, { useState, useEffect, useRef, useCallback } from 'https://esm.sh/react@18.2.0';
import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
import { 
  Mic, 
  MicOff, 
  Download, 
  Pause,
  Play,
  Clock, 
  AlertCircle
} from 'https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0';

const App = () => {
  // State for recording and transcription
  const [isRecording, setIsRecording] = useState(false);
  const [isPaused, setIsPaused] = useState(false);
  const [isMicActive, setIsMicActive] = useState(false); // マイクが物理的にONかどうか
  const [transcriptions, setTranscriptions] = useState([]); // { text, time, id }
  const [currentTranscript, setCurrentTranscript] = useState('');
  const [error, setError] = useState(null);

  // Refs for Speech Recognition
  const recognitionRef = useRef(null);
  const isRecordingRef = useRef(false); // イベントハンドラ内で最新のstateを参照するため
  const isPausedRef = useRef(false);
  const scrollRef = useRef(null);
  const wakeLockRef = useRef(null);

  // isRecordingの変更をRefに同期
  useEffect(() => {
    isRecordingRef.current = isRecording;
    isPausedRef.current = isPaused;
  }, [isRecording, isPaused]);

  // Initialize Speech Recognition
  useEffect(() => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setError("お使いのブラウザは音声認識（Web Speech API）をサポートしていません。ChromeまたはEdgeをお試しください。");
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'ja-JP';

    recognition.onstart = () => setIsMicActive(true);
    recognition.onend = () => {
      setIsMicActive(false);
      // 録音中（isRecordingがtrue）なのに終了した場合は、自動的に再開する
      if (isRecordingRef.current) {
        try {
          recognition.start();
        } catch (e) {
          console.error("Failed to restart recognition:", e);
        }
      }
    };

    recognition.onresult = (event) => {
      if (!isRecordingRef.current || isPausedRef.current) return; // 録音停止中または一時停止中は結果を無視する

      let interim = '';
      let final = '';

      for (let i = event.resultIndex; i < event.results.length; ++i) {
        if (event.results[i].isFinal) {
          final += event.results[i][0].transcript;
        } else {
          interim += event.results[i][0].transcript;
        }
      }

      if (final) {
        const timestamp = new Date().toLocaleTimeString();
        setTranscriptions(prev => [...prev, { text: final, time: timestamp, id: Date.now() }]);
        setCurrentTranscript('');
      } else {
        setCurrentTranscript(interim);
      }
    };

    recognition.onerror = (event) => {
      console.error('Speech recognition error', event.error);
      if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
        setError('マイクへのアクセスが拒否されたか、サービスが利用できません。');
        setIsRecording(false); // 再開ループを防ぐために停止
      }
    };

    recognitionRef.current = recognition;
  }, []);

  // Auto-scroll transcription list
  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [transcriptions, currentTranscript]);

  const toggleRecording = async () => {
    if (isRecording) {
      // 録音停止: マイクは切らずに、文字起こしの保存だけ止める
      // recognitionRef.current?.stop(); 
      setIsRecording(false);
      setIsPaused(false);
      
      // Wake Lock 解除（画面スリープ防止を解除）
      if (wakeLockRef.current) {
        await wakeLockRef.current.release().catch(console.error);
        wakeLockRef.current = null;
      }
    } else {
      // 録音開始
      setError(null);
      setTranscriptions([]);
      setIsRecording(true);
      setIsPaused(false);
      
      // 画面のスリープを防ぐ (Wake Lock API)
      if ('wakeLock' in navigator) {
        wakeLockRef.current = await navigator.wakeLock.request('screen').catch(console.error);
      }

      // マイクがまだ起動していない場合のみ起動する
      if (!isMicActive) {
        recognitionRef.current?.start();
      }
    }
  };

  const togglePause = () => {
    setIsPaused(!isPaused);
  };

  const exportDocument = () => {
    const content = `
# 会議文字起こしログ (${new Date().toLocaleDateString()})

## 文字起こし全文
${transcriptions.map(t => `[${t.time}] ${t.text}`).join('\n')}
    `;

    const blob = new Blob([content], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `transcription_${Date.now()}.md`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="min-h-screen bg-slate-950 text-slate-100 p-4 md:p-8 font-sans">
      <header className="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
          <h1 className="text-3xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent flex items-center gap-2">
            <Clock className="text-blue-400" />
            Minutes Pro
          </h1>
          <p className="text-slate-400 mt-1">リアルタイム文字起こしツール</p>
        </div>
        
        <div className="flex items-center gap-3">
          {isRecording ? (
            <>
              <button
                onClick={togglePause}
                className={`flex items-center gap-2 px-6 py-3 rounded-full font-bold transition-all shadow-lg ${
                  isPaused 
                    ? 'bg-blue-600 hover:bg-blue-700' 
                    : 'bg-yellow-500 hover:bg-yellow-600'
                }`}
              >
                {isPaused ? <Play size={20} /> : <Pause size={20} />}
                {isPaused ? '再開' : '一時停止'}
              </button>
              <button
                onClick={toggleRecording}
                className="flex items-center gap-2 px-6 py-3 rounded-full font-bold transition-all shadow-lg bg-red-500 hover:bg-red-600"
              >
                <MicOff size={20} />
                終了
              </button>
            </>
          ) : (
            <button
              onClick={toggleRecording}
              className="flex items-center gap-2 px-6 py-3 rounded-full font-bold transition-all shadow-lg bg-blue-600 hover:bg-blue-700"
            >
              <Mic size={20} />
              録音開始
            </button>
          )}
          
          {transcriptions.length > 0 && (
            <button
              onClick={exportDocument}
              className="flex items-center gap-2 px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-full font-bold transition-all"
            >
              <Download size={20} />
              保存
            </button>
          )}
        </div>
      </header>

      {error && (
        <div className="max-w-6xl mx-auto mb-6 p-4 bg-red-900/30 border border-red-500/50 rounded-xl flex items-center gap-3 text-red-200">
          <AlertCircle />
          {error}
        </div>
      )}

      <main className="max-w-4xl mx-auto">
        
        {/* Real-time Transcription Panel */}
        <section className="flex flex-col gap-4">
          <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden flex flex-col h-[600px] shadow-xl">
            <div className="p-4 border-b border-slate-800 flex items-center justify-between bg-slate-800/50">
              <h2 className="font-semibold flex items-center gap-2">
                <Clock size={18} className="text-blue-400" />
                リアルタイム文字起こし
              </h2>
              {isRecording && (
                <span className={`flex items-center gap-2 text-xs ${isPaused ? 'text-yellow-400' : 'text-emerald-400'}`}>
                  <span className={`w-2 h-2 rounded-full ${isPaused ? 'bg-yellow-400' : 'bg-emerald-400 animate-ping'}`} />
                  {isPaused ? 'Paused' : 'Listening...'}
                </span>
              )}
            </div>
            
            <div 
              ref={scrollRef}
              className="flex-1 overflow-y-auto p-4 space-y-4 scroll-smooth"
            >
              {transcriptions.length === 0 && !currentTranscript && (
                <div className="h-full flex flex-col items-center justify-center text-slate-500 opacity-50">
                  <Mic size={48} className="mb-4" />
                  <p>「録音開始」をクリックして、話し始めてください</p>
                </div>
              )}
              
              {transcriptions.map((t) => (
                <div key={t.id} className="group flex gap-4 animate-in fade-in slide-in-from-bottom-2 duration-300">
                  <span className="text-xs text-slate-500 mt-1 font-mono shrink-0">
                    {t.time}
                  </span>
                  <p className="text-slate-200 leading-relaxed bg-slate-800/30 p-2 rounded-lg group-hover:bg-slate-800/50 transition-colors">
                    {t.text}
                  </p>
                </div>
              ))}
              
              {currentTranscript && (
                <div className="flex gap-4 opacity-70">
                  <span className="text-xs text-slate-500 mt-1 font-mono shrink-0">
                    ...
                  </span>
                  <p className="text-blue-300 italic p-2">{currentTranscript}</p>
                </div>
              )}
            </div>
          </div>
        </section>

        {/* Stats / Info */}
        <section className="mt-6">
          <div className="bg-gradient-to-br from-blue-900/20 to-emerald-900/20 border border-blue-800/30 rounded-2xl p-6">
            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">ステータス</h3>
            <div className="grid grid-cols-1 gap-4">
              <div>
                <p className="text-2xl font-bold">{transcriptions.length}</p>
                <p className="text-[10px] text-slate-500 uppercase">発話数</p>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer className="max-w-6xl mx-auto mt-12 pt-8 border-t border-slate-800 text-center text-slate-600 text-sm">
        &copy; 2024 Minutes Pro. Powered by Web Speech API.
      </footer>
    </div>
  );
};

const root = createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
